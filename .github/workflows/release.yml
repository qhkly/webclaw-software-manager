name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs'),p='package.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Synced to $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build (arm64)
        run: npm run build -- --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

  build-macos-x64:
    name: macOS (x64 Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs'),p='package.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Synced to $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build (x64)
        run: npm run build -- --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

  build-linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs'),p='package.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Synced to $VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  build-linux-arm64:
    name: Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs'),p='package.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Synced to $VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          node -e "const fs=require('fs'),p='package.json',d=JSON.parse(fs.readFileSync(p,'utf8'));d.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(d,null,2)+'\n');" "$VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          echo "Synced to $VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Create GitHub Release
    needs: [build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
